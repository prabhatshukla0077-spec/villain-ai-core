<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f13;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6;
            --secondary: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fluid Animated Background */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 25%);
            filter: blur(60px);
            z-index: 0;
            animation: pulse 15s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* Main App Container (Glassmorphism) */
        .app-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        h1 { margin: 0; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }

        /* Chat Area */
        .chat-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-container {
            padding: 20px 30px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .input-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .input-box:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.06); }

        .btn-action {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .btn-action:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .btn-send { background: var(--text-main); color: var(--bg-color); font-weight: 600; border: none; }
        .btn-send:hover { background: var(--primary); color: white; transform: scale(1.05); }
        .recording { color: #ef4444; border-color: #ef4444; animation: pulse 1s infinite; }

        /* Typing Indicator */
        .typing { display: none; align-self: flex-start; gap: 5px; padding: 15px; }
        .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="app-container">
        <div class="header">
            <div class="logo-area">
                <div class="status-dot"></div>
                <h1>Nexus AI</h1>
            </div>
            <div style="font-size: 0.8rem; color: var(--text-muted);">Multi-Model System</div>
        </div>

        <div class="chat-container" id="chatBox">
            <div class="message msg-ai">Hello. System initialized and ready for input.</div>
            <div class="typing" id="typingIndicator">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="input-container">
            <button class="btn-action" id="micBtn" onclick="toggleMic()" title="Voice Input">🎙️</button>
            <input type="text" class="input-box" id="userInput" placeholder="Ask me anything..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="btn-action btn-send" onclick="sendMessage()">→</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const micBtn = document.getElementById('micBtn');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${sender}`;
            msgDiv.innerText = text;
            chatBox.insertBefore(msgDiv, typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            typingIndicator.style.display = 'flex';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';
                appendMessage(data.response, 'ai');
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("System offline. Please check your connection.", 'ai');
            }
        }

        // Voice Recognition (Works in Chrome/Edge)
        function toggleMic() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("Voice input is not supported in this browser."); return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            micBtn.classList.add('recording');
            
            recognition.onresult = function(event) {
                userInput.value = event.results[0][0].transcript;
                micBtn.classList.remove('recording');
                sendMessage();
            };
            
            recognition.onerror = function() { micBtn.classList.remove('recording'); };
            recognition.onend = function() { micBtn.classList.remove('recording'); };
            
            recognition.start();
        }
    </script>
</body>
</html>
