<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ VillainAI | V3.0 Vision Mainframe</title>
    <style>
        :root { --glow: #ff0000; --bg: #050000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.25; display: block; }
        #ui-layer { position: relative; z-index: 5; display: flex; height: 100vh; width: 100%; }
        
        #sidebar { width: 280px; background: rgba(15, 0, 0, 0.9); border-right: 2px solid var(--glow); padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
        #sidebar h3 { color: var(--glow); font-size: 0.9rem; letter-spacing: 2px; margin: 0; border-bottom: 1px solid #440000; padding-bottom: 10px; }
        #history-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .hist-item { font-size: 0.85rem; padding: 12px; border: 1px solid #440000; background: #0a0000; color: #ccc; line-height: 1.4; }

        #main-terminal { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        h1 { font-size: 4rem; letter-spacing: 12px; margin: 0; text-shadow: 0 0 15px var(--glow); text-transform: uppercase; animation: glitch 4s infinite alternate; }
        @keyframes glitch { 0% { transform: skew(0deg); } 2% { transform: skew(2deg); text-shadow: -2px -2px blue; } 4% { transform: skew(0deg); } 100% { transform: skew(0deg); } }
        
        .subtitle { color: var(--glow); font-size: 0.8rem; letter-spacing: 6px; margin-bottom: 40px; font-weight: bold; opacity: 0.8; }

        #chat-container { width: 90%; max-width: 800px; background: rgba(10, 0, 0, 0.85); border: 1px solid var(--glow); padding: 35px; box-shadow: 0 0 40px rgba(255,0,0,0.2), inset 0 0 20px rgba(255,0,0,0.1); backdrop-filter: blur(10px); }
        .input-area { display: flex; background: rgba(0,0,0,0.6); border: 1px solid #550000; padding: 8px; gap: 8px; }
        .prompt { color: var(--glow); font-size: 1.5rem; font-weight: bold; margin: 0 10px; align-self: center; }
        input { flex: 1; background: transparent; border: none; color: white; font-size: 1.2rem; outline: none; font-family: 'Courier New', Courier, monospace; }
        
        button { background: var(--glow); color: black; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        button:hover { background: white; color: red; box-shadow: 0 0 15px white; }
        
        #mic-btn, #file-btn { background: #330000; color: white; border: 1px solid #ff0000; }
        #mic-btn.active { background: #ff0000; color: black; box-shadow: 0 0 20px #ff0000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #response { margin-top: 30px; height: 180px; overflow-y: auto; font-size: 1.2rem; color: #ddd; line-height: 1.6; border-top: 1px dashed #550000; padding-top: 20px; }
        .cursor { display: inline-block; width: 10px; height: 1.2rem; background: var(--glow); animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="ui-layer">
        <div id="sidebar">
            <h3>ARCHIVED LOGS</h3>
            <div id="history-list"></div>
        </div>
        
        <div id="main-terminal">
            <h1>VILLAIN AI</h1>
            <div class="subtitle">VISION & DATA SYSTEMS ONLINE</div>
            
            <div id="chat-container">
                <div class="input-area">
                    <span class="prompt">>></span>
                    <input type="text" id="chatInput" placeholder="AWAITING DATA UPLINK..." onkeypress="if(event.key=='Enter')sendMessage()">
                    
                    <input type="file" id="fileInput" style="display: none;" accept=".txt,.csv,.png,.jpg,.jpeg">
                    
                    <button id="file-btn" onclick="document.getElementById('fileInput').click()" title="Upload Image or Document">📁 UPLINK</button>
                    <button id="mic-btn" onclick="toggleLiveVoice()">🎤 VOICE</button>
                    <button onclick="sendMessage()">EXECUTE</button>
                </div>
                <div id="response">SENSORS READY.<span class="cursor"></span></div>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = JSON.parse(localStorage.getItem('villain_logs')) || [];
        const responseBox = document.getElementById("response");
        
        // --- DATA SCANNER SYSTEM (FILE/IMAGE UPLOAD) ---
        let currentFileData = null;
        let currentFileType = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            const inputField = document.getElementById("chatInput");
            inputField.placeholder = `[DATA LOADED]: ${file.name} - Enter command...`;

            if (file.type.startsWith('image/')) {
                reader.onload = function(event) {
                    currentFileData = event.target.result; 
                    currentFileType = 'image';
                };
                reader.readAsDataURL(file); // Converts image to Base64 code
            } else {
                reader.onload = function(event) {
                    currentFileData = event.target.result; 
                    currentFileType = 'text';
                };
                reader.readAsText(file); // Reads text inside documents
            }
        });

        // --- SIDEBAR MEMORY ---
        function updateSidebar() {
            const list = document.getElementById("history-list");
            list.innerHTML = "";
            chatHistory.slice().reverse().forEach(item => {
                const div = document.createElement("div");
                div.className = "hist-item";
                div.innerHTML = `<strong style="color:#f00;">You:</strong> ${item.user.substring(0, 25)}<br><span style="color:#888;">${item.ai.substring(0, 35)}...</span>`;
                list.appendChild(div);
            });
        }
        updateSidebar();

        // --- LIVE VOICE SYSTEM ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        let isLiveVoiceActive = false;

        if (recognition) {
            recognition.continuous = true;
            recognition.interimResults = true; 
            
            recognition.onresult = (e) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
                    else interimTranscript += e.results[i][0].transcript;
                }
                
                document.getElementById("chatInput").value = finalTranscript || interimTranscript;
                if (finalTranscript) sendMessage(finalTranscript);
            };
        }

        function toggleLiveVoice() {
            if (!recognition) return alert("Browser does not support Voice. Use Chrome.");
            isLiveVoiceActive = !isLiveVoiceActive;
            const btn = document.getElementById("mic-btn");
            const inputField = document.getElementById("chatInput");

            if (isLiveVoiceActive) {
                btn.classList.add("active");
                btn.innerHTML = "🛑 STOP";
                inputField.placeholder = "LISTENING...";
                try { recognition.start(); } catch(e) {}
            } else {
                btn.classList.remove("active");
                btn.innerHTML = "🎤 VOICE";
                inputField.placeholder = "AWAITING DATA UPLINK...";
                try { recognition.stop(); } catch(e) {}
            }
        }

        // --- AI COMMUNICATION ---
        async function typeWriter(text) {
            responseBox.innerHTML = "😈 "; 
            for (let i = 0; i < text.length; i++) {
                responseBox.innerHTML += text.charAt(i);
                await new Promise(r => setTimeout(r, 15));
            }
            responseBox.innerHTML += '<span class="cursor"></span>';
        }

        async function sendMessage(textInput) {
            const inputField = document.getElementById("chatInput");
            const text = textInput || inputField.value.trim();
            if (!text && !currentFileData) return; // Must have text OR a file
            
            inputField.value = "";
            inputField.placeholder = "AWAITING DATA UPLINK...";
            if(isLiveVoiceActive) try{ recognition.stop(); }catch(e){} 
            
            responseBox.innerHTML = "<span style='color:red;'>SCANNING DATA & PROCESSING LOGIC...</span><span class='cursor'></span>";

            // Prepare Payload
            const payload = { 
                message: text, 
                file_data: currentFileData, 
                file_type: currentFileType 
            };

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                const aiAnswer = data.response;
                
                // Clear File Memory after sending
                currentFileData = null;
                currentFileType = null;
                document.getElementById("fileInput").value = ""; 

                // Save to Visual History
                chatHistory.push({user: text || "[FILE UPLOADED]", ai: aiAnswer});
                if(chatHistory.length > 10) chatHistory.shift();
                localStorage.setItem('villain_logs', JSON.stringify(chatHistory));
                updateSidebar();

                typeWriter(aiAnswer);

                // Speak Out Loud
                window.speechSynthesis.cancel(); 
                const speech = new SpeechSynthesisUtterance(aiAnswer);
                speech.pitch = 0.2; speech.rate = 0.9;
                speech.onend = () => { if (isLiveVoiceActive) try{ recognition.start(); }catch(e){} };
                window.speechSynthesis.speak(speech);

            } catch (err) {
                typeWriter("CRITICAL ERROR: MAINFRAME DISCONNECTED.");
                if (isLiveVoiceActive) try{ recognition.start(); }catch(e){}
            }
        }

        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let fontSize = 16, columns, drops;

        function initMatrix() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            columns = Math.ceil(canvas.width / fontSize); drops = [];
            for (let x = 0; x < columns; x++) drops[x] = Math.random() * -50;
        }
        initMatrix(); window.addEventListener('resize', initMatrix);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#cc0000'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(Math.floor(Math.random() * 94) + 33);
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
    </script>
</body>
</html>
