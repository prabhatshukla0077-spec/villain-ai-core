<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villain AI | Mainframe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #050505;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent-primary: #6366f1; /* Indigo */
            --accent-secondary: #a855f7; /* Purple */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fluid Animated Glowing Orbs Background */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(99, 102, 241, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: rgba(168, 85, 247, 0.15); bottom: -20%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Glassmorphism Dashboard Container */
        .dashboard {
            position: relative; z-index: 1;
            width: 95%; max-width: 900px; height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex; flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .status-pulse { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 12px #10b981; animation: pulse 2s infinite; }
        h1 { margin: 0; font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Chat Area */
        .chat-box {
            flex: 1; padding: 30px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message {
            max-width: 80%; padding: 16px 20px;
            border-radius: 18px; font-size: 0.95rem; line-height: 1.6;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white; border-bottom-right-radius: 4px;
        }

        .msg-ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main); border-bottom-left-radius: 4px;
        }

        /* Input Controls */
        .input-zone {
            padding: 20px 30px; border-top: 1px solid var(--glass-border);
            display: flex; gap: 12px; align-items: center;
        }

        .text-input {
            flex: 1; background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border); padding: 16px 24px;
            border-radius: 100px; color: white; font-size: 1rem;
            outline: none; transition: all 0.3s;
        }
        .text-input:focus { border-color: rgba(255,255,255,0.2); background: rgba(0, 0, 0, 0.5); }

        .btn {
            background: transparent; border: 1px solid var(--glass-border);
            color: var(--text-muted); width: 52px; height: 52px;
            border-radius: 50%; cursor: pointer; transition: all 0.3s;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem;
        }
        .btn:hover { background: rgba(255,255,255,0.1); color: white; transform: scale(1.05); }
        .btn-send { background: var(--text-main); color: var(--bg-base); border: none; }
        .btn-send:hover { background: white; }
        .recording { background: #ef4444; color: white; border-color: #ef4444; animation: pulse 1s infinite; }

        /* Modern Typing Indicator */
        .typing { display: none; align-self: flex-start; gap: 6px; padding: 16px 20px; background: rgba(255, 255, 255, 0.02); border-radius: 18px; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }
        .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="dashboard">
        <div class="header">
            <div class="brand">
                <div class="status-pulse"></div>
                <h1>VILLAIN // CORE</h1>
            </div>
            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Neural Net Online</div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message msg-ai">System initialized. Awaiting user input.</div>
            
            <div class="typing" id="typingIndicator">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="input-zone">
            <button class="btn" id="micBtn" onclick="toggleVoice()" title="Voice Interface">🎙️</button>
            <input type="text" class="text-input" id="userInput" placeholder="Send a message to the mainframe..." onkeypress="if(event.key === 'Enter') sendData()">
            <button class="btn btn-send" onclick="sendData()">↑</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const micBtn = document.getElementById('micBtn');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${sender}`;
            msgDiv.innerText = text;
            chatBox.insertBefore(msgDiv, typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendData() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            // Show fluid typing indicator
            typingIndicator.style.display = 'flex';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';
                appendMessage(data.response, 'ai');
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Network failure. Connection to the core was lost.", 'ai');
            }
        }

        // Integrated Voice Recognition
        function toggleVoice() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("Voice interface is not supported by this browser engine."); return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            micBtn.classList.add('recording');
            
            recognition.onresult = function(event) {
                userInput.value = event.results[0][0].transcript;
                micBtn.classList.remove('recording');
                sendData(); // Auto-send when finished talking
            };
            
            recognition.onerror = function() { micBtn.classList.remove('recording'); };
            recognition.onend = function() { micBtn.classList.remove('recording'); };
            
            recognition.start();
        }
    </script>
</body>
</html>
