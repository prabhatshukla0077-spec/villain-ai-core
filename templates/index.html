<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. SYSTEM</title>
    <style>
        body {
            background-color: #050505; color: #00e5ff; font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        h2 { text-shadow: 0 0 10px #00e5ff; letter-spacing: 2px; }
        #chat-box {
            width: 100%; max-width: 600px; height: 60%; border: 1px solid #00e5ff; padding: 15px;
            overflow-y: auto; background-color: #0a0a0a; box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); margin-bottom: 20px;
        }
        .message { margin-bottom: 15px; line-height: 1.5; }
        .user-msg { color: #ffffff; text-align: right; }
        .ai-msg { color: #00e5ff; text-align: left; border-left: 2px solid #00e5ff; padding-left: 10px;}
        .input-area { width: 100%; max-width: 600px; display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 12px; background: #000; border: 1px solid #00e5ff; color: #fff; font-family: inherit; }
        button {
            padding: 12px 20px; background: #00e5ff; color: #000; border: none; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px #00e5ff;}
        #mic-btn { background: #ff003c; color: white; }
        #mic-btn.recording { background: #fff; color: #ff003c; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h2>J.A.R.V.I.S. ONLINE</h2>

    <div id="chat-box">
        <div class="message ai-msg" id="intro-msg">Click 'Wake Up' to initialize audio protocols, Sir.</div>
    </div>

    <div class="input-area">
        <button id="mic-btn" onclick="startDictation()">🎙️ TALK</button>
        <input type="text" id="user-input" placeholder="Or type command..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">SEND</button>
    </div>
    
    <div style="margin-top: 15px;">
        <button onclick="wakeUp()" style="background: #222; color: #00e5ff;">Wake Up (Enable Audio)</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const micBtn = document.getElementById('mic-btn');
        let voiceSynthesizer = window.speechSynthesis;

        function wakeUp() {
            document.getElementById('intro-msg').innerText = "Audio initialized. Waiting for command, Mr. Prabhat.";
            speakText("Systems online. Good to see you, Sir.");
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        // --- MICROPHONE CODE ---
        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                var recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = "en-US";
                
                micBtn.classList.add('recording');
                micBtn.innerText = "Listening...";
                
                recognition.start();

                recognition.onresult = function(e) {
                    document.getElementById('user-input').value = e.results[0][0].transcript;
                    recognition.stop();
                    micBtn.classList.remove('recording');
                    micBtn.innerText = "🎙️ TALK";
                    sendMessage(); // Auto send when you stop talking
                };

                recognition.onerror = function(e) {
                    recognition.stop();
                    micBtn.classList.remove('recording');
                    micBtn.innerText = "🎙️ TALK";
                }
            } else {
                alert("Sorry Sir, your browser does not support voice recognition.");
            }
        }

        // --- SEND TO BACKEND ---
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user-msg');
            userInput.value = '';
            const loadingId = 'loading-' + Date.now();
            addMessage('Processing...', 'ai-msg', loadingId);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();
                addMessage(data.response, 'ai-msg');
                speakText(data.response); // Speak the answer

            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage('Network error.', 'ai-msg');
            }
        }

        function addMessage(text, className, id = '') {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = (className === 'user-msg' ? 'You: ' : 'JARVIS: ') + text;
            if (id) div.id = id;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- SPEAKER CODE ---
        function speakText(text) {
            voiceSynthesizer.cancel(); // Stop talking if already talking
            const utterance = new SpeechSynthesisUtterance(text);
            
            const voices = voiceSynthesizer.getVoices();
            const britishVoice = voices.find(v => v.name.includes('UK English Male') || v.lang === 'en-GB' || v.name.includes('Google UK English Male'));
            
            if (britishVoice) utterance.voice = britishVoice;
            
            utterance.pitch = 0.8; // Deep, robotic pitch
            utterance.rate = 1.0; 
            voiceSynthesizer.speak(utterance);
        }

        voiceSynthesizer.onvoiceschanged = function() { voiceSynthesizer.getVoices(); };
    </script>
</body>
</html>
